<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px;background:#022c22;color:white;}
nav{width:100%;max-width:1200px;display:flex;justify-content:space-between;margin-bottom:20px;}
nav h2{font-size:28px;}
nav div span{margin-left:20px;cursor:pointer;transition:0.2s;}
nav div span:hover{color:#10b981;}
.page{display:none;width:100%;max-width:1200px;position:relative;}
.active{display:block;}
.section,.card{max-width:900px;margin:20px auto;background:rgba(255,255,255,0.9);color:#065f46;padding:30px;border-radius:25px;text-align:center;transition:.3s;}
.section:hover,.card:hover{transform:translateY(-8px);}
.profile-pic{width:150px;height:150px;object-fit:cover;border-radius:50%;margin-bottom:15px;border:5px solid white;}
#imageContainer{display:flex;flex-wrap:wrap;gap:15px;justify-content:center;}
#imageContainer img{width:150px;height:150px;object-fit:cover;border-radius:10px;cursor:pointer;}
footer{color:white;margin-top:20px;text-align:center;font-size:14px;}
footer a{margin:0 10px;color:#10b981;text-decoration:none;font-weight:600;transition:0.2s;}
footer a:hover{color:white;text-decoration:underline;}
</style>
</head>
<body>

<nav>
  <h2>Portfolio</h2>
  <div>
    <span onclick="showPage('home')">Home</span>
    <span onclick="showPage('dashboard')">Dashboard</span>
    <span onclick="showPage('uploadMenu')">Upload</span>
  </div>
</nav>

<div id="home" class="page active">
  <div class="card">
    <img src="image/24c8c672-1ad8-4b24-9739-50231a1b78fe.jpg" class="profile-pic" alt="Profile">
    <h2>Mick Jerryme Mhier M. Varona</h2>
    <div class="info"><strong>Student No:</strong> 251100192</div>
    <div class="info"><strong>Course & Section:</strong> BSCS-1D</div>
    <div class="about">
      I want to be a fully pledged developer in the future.
    </div>
  </div>
</div>

<div id="dashboard" class="page">
  <div class="section">
    <canvas id="scoreChart"></canvas>
  </div>
  <div class="section" id="imageContainer"></div>
</div>

<div id="uploadMenu" class="page">
  <div class="section">
    <button onclick="showPage('quizPage')">Quiz Upload</button><br><br>
    <button onclick="showPage('labPage')">Lab Work Upload</button><br><br>
    <button onclick="showPage('examPage')">Major Exam Upload</button>
  </div>
</div>

<div id="quizPage" class="page">
  <div class="section">
    <form id="quizForm">
      <input type="text" placeholder="Quiz Title" required>
      <input type="file" accept="image/*" required>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<div id="labPage" class="page">
  <div class="section">
    <form id="labForm">
      <input type="text" placeholder="Lab Title" required>
      <input type="file" accept="image/*" required>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<div id="examPage" class="page">
  <div class="section">
    <form id="examForm">
      <input type="text" placeholder="Exam Title" required>
      <input type="file" accept="image/*" required>
      <button type="submit">Submit</button>
    </form>
  </div>
</div>

<footer>
  © 2026 Mick Varona
</footer>

<script>
// Preload images in localStorage if empty
if(!localStorage.getItem('records')){
  const exampleData = [
    {type: 'Quiz', title: 'Quiz 1', score: 18, total: 20, image: 'image/18f1c448-e3c2-40ff-b46e-d916772600f9.jpg'},
    {type: 'Quiz', title: 'Quiz 2', score: 14, total: 20, image: 'image/24c8c672-1ad8-4b24-9739-50231a1b78fe.jpg'},
    {type: 'Quiz', title: 'Quiz 3', score: 5, total: 20, image: 'image/f22d8e86-a6e1-495f-956a-6e3b33fbed9a.jpg'},
    {type: 'Activity', title: 'Lab 1', score: 75, total: 100, image: 'image/c6e68e3f-4ba9-4c5f-bb9c-ab1a6bd2484b.jpg'}
  ];
  localStorage.setItem('records', JSON.stringify(exampleData));
}

function showPage(pageId){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  if(pageId==='dashboard') updateDashboard();
}

// Handle uploads
function saveUpload(formId,type){
  document.getElementById(formId).addEventListener('submit',function(e){
    e.preventDefault();
    let title=this.querySelector('input[type=text]').value;
    let imageFile=this.querySelector('input[type=file]').files[0];
    let reader=new FileReader();
    reader.onload=()=>{
      let imageData=reader.result;
      let score=prompt('Enter score:');
      let total=prompt('Enter total:');
      let data=JSON.parse(localStorage.getItem('records'))||[];
      data.push({type,title,score:Number(score),total:Number(total),image:imageData});
      localStorage.setItem('records',JSON.stringify(data));
      alert(type+' saved!');
      this.reset();
      updateDashboard();
    };
    if(imageFile) reader.readAsDataURL(imageFile);
  });
}

saveUpload('quizForm','Quiz');
saveUpload('labForm','Activity');
saveUpload('examForm','Exam');

// Update dashboard with images and bar chart
function updateDashboard(){
  let data=JSON.parse(localStorage.getItem('records'))||[];
  let container=document.getElementById('imageContainer');
  container.innerHTML='';
  let labels=[], scores=[];

  data.forEach(item=>{
    if(item.image){
      let img=document.createElement('img');
      img.src=item.image;
      img.alt=item.title;
      container.appendChild(img);
    }
    if(item.score!==undefined && item.total!==undefined){
      labels.push(item.title);
      scores.push(((item.score/item.total)*100).toFixed(1));
    }
  });

  const ctx=document.getElementById('scoreChart').getContext('2d');
  if(window.chart) window.chart.destroy();
  window.chart=new Chart(ctx,{
    type:'bar',
    data:{
      labels:labels,
      datasets:[{label:'Score (%)', data:scores, backgroundColor:'#cc0000'}]
    },
    options:{scales:{y:{beginAtZero:true,max:100}}}
  });
}
</script>

</body>
</html>
