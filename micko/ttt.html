<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
html { scroll-behavior:smooth; }
body { font-family:'Inter',sans-serif; background:#000; color:#fff; margin:0; }

/* Navbar */
nav{
  position:fixed;
  width:100%;
  top:0;
  padding:10px 28px;
  display:flex;
  justify-content:space-between;
  background:#0a0a0a;
  border-bottom:1px solid #1a1a1a;
}
nav a{ color:#bbb; text-decoration:none; margin-left:15px; }
nav a:hover{ color:#fff; }

section{
  padding:100px 28px 40px;
  max-width:900px;
  margin:auto;
}

/* Profile */
.profile{ text-align:center; }

.profile img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:50%;
  border:3px solid #1f1f1f;
  margin-bottom:10px;
}

/* Cards */
.container{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
}
.card{
  background:#0f0f0f;
  padding:14px;
  border-radius:6px;
  border:1px solid #1f1f1f;
}

/* Academic Boxes */
.academic-grid{
  display:grid;
  gap:20px;
}

.academic-box{
  background:#0d0d0d;
  padding:15px;
  border-radius:8px;
  border:1px solid #1f1f1f;
}

.academic-box h3{
  margin-bottom:10px;
}

/* DROP ZONE */
.drop-zone{
  border:2px dashed #444;
  border-radius:10px;
  padding:20px;
  text-align:center;
  color:#777;
  transition:0.3s;
  min-height:150px;

  display:flex;
  flex-direction:column;
  gap:10px;
}

.drop-zone.dragover{
  border-color:#fff;
  color:#fff;
  background:#111;
}

/* Images inside box */
.drop-zone img{
  width:100%;
  max-height:200px;
  object-fit:cover;
  border-radius:6px;
  border:1px solid #222;
}

#viewer{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
z-index:999;
justify-content:center;
align-items:center;
}

#viewer img{
width:100%;
height:100%;
object-fit:contain;
}

.close{
position:absolute;
top:20px;
right:30px;
font-size:30px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<nav>
  <h3>Mick Jerryme Mhier M. Varona</h3>
  <div>
    <a href="#profile">Profile</a>
    <a href="#about">About</a>
    <a href="#academics">Academics</a>
  </div>
</nav>

<!-- PROFILE -->

    <div class="card">

<!-- ACADEMICS -->
<section id="academics">

    <!-- QUIZZES -->
    <div class="academic-box">

      <button onclick="openViewer('micko/3a9bbeb7-6628-48fd-ab09-165ca242ba45.jpg')">Quiz 2</button>
      <button onclick="openViewer('micko/928f75d4-8e4d-4814-817e-12a0d6b4d73d.jpg')">Quiz 3</button>
      

    <div class="academic-box">
      <h3>Activities</h3>
     <button onclick="openViewer('micko/0fe16fb7-ae42-433e-a7d4-4fa9389134e6.jpg')">Activity 1</button>
    </div>

    <!-- EXAMS -->
    <div class="academic-box">

      <button onclick="openViewer('micko/')">Exam 1</button> 
    </div>

</section>

<script>
// DRAG & DROP FUNCTION
document.querySelectorAll('.drop-zone').forEach(zone => {

  zone.addEventListener('dragover', e => {
    e.preventDefault();
    zone.classList.add('dragover');
  });

  zone.addEventListener('dragleave', () => {
    zone.classList.remove('dragover');
  });

  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('dragover');

    const files = e.dataTransfer.files;

    for(let file of files){
      if(file.type.startsWith('image/')){
        const reader = new FileReader();

        reader.onload = function(ev){
          const img = document.createElement('img');
          img.src = ev.target.result;
          zone.appendChild(img);
        }

        reader.readAsDataURL(file);
      }
    }
  });

});
</script>
<div id="viewer">
<span class="close" onclick="closeViewer()">&times;</span>
<img id="viewerImg">
</div>

<script>

function openViewer(src){
document.getElementById("viewer").style.display="flex";
document.getElementById("viewerImg").src=src;
}

function closeViewer(){
document.getElementById("viewer").style.display="none";
}
</body>
</html>
